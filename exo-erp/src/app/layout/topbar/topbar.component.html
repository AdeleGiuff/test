<header class="topbar">
    <div class="topbar-left">
        <div class="page-title-wrap">
            <h1 class="page-title text-h1">{{ pageTitle }}</h1>
            <span class="page-sub text-caption">{{ pageSub }}</span>
        </div>
    </div>

    <div class="topbar-right">
        @for (action of quickActions; track action.icon) {
        <button class="icon-btn" type="button" aria-label="Quick action">
            <span class="material-icons-round icon-glyph">{{ action.icon }}</span>

            @if (action.count) {
            <span class="notif-dot text-notif">{{ action.count }}</span>
            }
        </button>
        }

        <span class="separator" aria-hidden="true"></span>

        <button class="user-chip" type="button" aria-label="Profilo utente">
            <div class="user-avatar text-mono-sm">{{ user.initials }}</div>

            <div class="user-meta">
                <div class="user-name text-body">{{ user.name }}</div>
                <div class="user-role text-caption">{{ user.role }}</div>
            </div>

            <span class="material-icons-round user-chevron">expand_more</span>
        </button>
    </div>
</header>
