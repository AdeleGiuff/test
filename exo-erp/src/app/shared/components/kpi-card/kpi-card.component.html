<div class="kpi-card page-card" [class.green]="variant === 'green'" [class.orange]="variant === 'orange'"
    [class.red]="variant === 'red'">
    <div class="top">
        <div class="icon-wrap">
            <span class="material-icons-round">{{ icon }}</span>
        </div>

        <div class="trend mono">{{ trend }}</div>
    </div>

    <div class="value mono">{{ value }}</div>
    <div class="label">{{ label }}</div>
    <div class="progress"></div>
</div>
